  # CUSTOM RTMP/SRT/HLS/WHIP ENDPOINTS
  # ═══════════════════════════════════════════
  
  custom_endpoints:
    - name: ''
      type: 'rtmp'  # rtmp, srt, hls, whip
      url: ''
      enabled: false
  
  # ═══════════════════════════════════════════
  # AUDIO-ONLY PLATFORMS (Internet Radio)
  # ═══════════════════════════════════════════
  # Embed player on your website!
  
  icecast:
    enabled: false
    host: 'localhost'
    port: 8000
    password: 'hackme'
    mount: '/live'
    # Listeners go to: http://host:port/live
    
  shoutcast:
    enabled: false
    host: 'localhost'
    port: 8000
    password: ''
  
  # ═══════════════════════════════════════════
  # RECORDING - Save VODs/Podcasts
  # ═══════════════════════════════════════════
  # Upload recordings later to:
  # - YouTube (as VODs)
  # - Spotify (podcast)
  # - Apple Podcasts
  # - Mixcloud
  # - SoundCloud
  
  recording:
    enabled: true
    path: 'data/recordings'
    format: 'mp4'  # mp4, mkv, flv
